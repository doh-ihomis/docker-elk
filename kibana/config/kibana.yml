---
## Default Kibana configuration from Kibana base image.
## https://github.com/elastic/kibana/blob/main/src/dev/build/tasks/os_packages/docker_generator/templates/kibana_yml.template.ts
#
server.name: kibana
server.host: 0.0.0.0
server.publicBaseUrl: "http://kibana.doh.gov.ph"
server.port: 5601

# Elasticsearch settings
elasticsearch.hosts: [ https://elasticsearch:9200 ]

# Elasticsearch monitoring settings
monitoring.ui.container.elasticsearch.enabled: true
# Logstash monitoring settings
monitoring.ui.container.logstash.enabled: true

## X-Pack security credentials
#
elasticsearch.username: kibana_system
elasticsearch.password: ${KIBANA_SYSTEM_PASSWORD}

##
## TLS configuration
## See instructions from README to enable.
##

## Communications between Kibana and Elasticsearch
## see https://www.elastic.co/guide/en/kibana/current/configuring-tls.html#configuring-tls-kib-es
#
elasticsearch.ssl.certificateAuthorities: [ config/ca.crt ]

## Communications between web browsers and Kibana
## see https://www.elastic.co/guide/en/kibana/current/configuring-tls.html#configuring-tls-browser-kib
#
server.ssl.enabled: false
server.ssl.certificate: config/kibana.crt
server.ssl.key: config/kibana.key

#xpack.reporting.kibanaServer.hostname: localhost

## Encryption keys (optional but highly recommended)
##
## Generate with either
##  $ docker container run --rm docker.elastic.co/kibana/kibana:8.6.2 bin/kibana-encryption-keys generate
##  $ openssl rand -hex 32
##
## https://www.elastic.co/guide/en/kibana/current/using-kibana-with-security.html
## https://www.elastic.co/guide/en/kibana/current/kibana-encryption-keys.html
#
#xpack.security.encryptionKey:
#xpack.encryptedSavedObjects.encryptionKey:
#xpack.reporting.encryptionKey:
# X-Pack Security
#xpack.security.enabled: true
xpack.encryptedSavedObjects.encryptionKey: 31389f05ac32814a0979987d166be11d
xpack.reporting.encryptionKey: 4fb6da22887a6776d8d7dffaacf2b8ea
xpack.security.encryptionKey: 39e989f1465c3b209b8f4b28c609cfc3

## Fleet
## https://www.elastic.co/guide/en/kibana/current/fleet-settings-kb.html
#

# fleet settings for Elastic-agent
#xpack.fleet.enabled: true
#xpack.fleet.agents.enabled: true
#xpack.fleet.agents.tlsCheckDisabled: true
#xpack.fleet.agents.kibana.host: "http://kibana.doh.gov.ph:5602"
#xpack.fleet.agents.elasticsearch.host: "http://elasticsearch.doh.gov.ph:9200"

#xpack.ingestManager.enabled: true
#xpack.ingestManager.fleet.enabled: true

xpack.reporting.roles.enabled: false

xpack.fleet.agents.fleet_server.hosts: [ https://10.11.134.8:8220 ]

telemetry.enabled: "true"

xpack.fleet.outputs:
  - id: fleet-default-output
    name: default
    type: elasticsearch
    hosts: [ https://elasticsearch:9200 ]
    # Set to output of 'docker-compose up tls'. Example:
    ca_trusted_fingerprint: 30a4472d74454911c0fafff64fe055ff4807cbd0b615a8eeebe1945a16718f81
    is_default: true
    is_default_monitoring: true

xpack.fleet.packages:
  - name: fleet_server
    version: latest
  - name: system
    version: latest
  - name: elastic_agent
    version: latest
  - name: apm
    version: latest

xpack.fleet.agentPolicies:
  - name: Fleet Server Policy
    id: fleet-server-policy
    description: Static agent policy for Fleet Server
    monitoring_enabled:
      - logs
      - metrics
    package_policies:
      - name: fleet_server-1
        package:
          name: fleet_server
      - name: system-1
        package:
          name: system
      - name: elastic_agent-1
        package:
          name: elastic_agent
  - name: Agent Policy APM Server
    id: agent-policy-apm-server
    description: Static agent policy for the APM Server integration
    monitoring_enabled:
      - logs
      - metrics
    package_policies:
      - name: system-1
        package:
          name: system
      - name: elastic_agent-1
        package:
          name: elastic_agent
      - name: apm-1
        package:
          name: apm
        # See the APM package manifest for a list of possible inputs.
        # https://github.com/elastic/apm-server/blob/v8.5.0/apmpackage/apm/manifest.yml#L41-L168
        inputs:
          - type: apm
            vars:
              - name: host
                value: 0.0.0.0:8200
              - name: url
                value: https://apm-server.doh.gov.ph:8200
              - name: tls_enabled
                value: true
              - name: tls_certificate
                value: /usr/share/kibana/config/kibana.crt
              - name: tls_key
                value: /usr/share/kibana/config/kibana.key
