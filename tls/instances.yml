# This file is used by elasticsearch-certutil to generate X.509 certificates
# for stack components.
#
# Ref. https://www.elastic.co/guide/en/elasticsearch/reference/current/certutil.html#certutil-silent
instances:

- name: elasticsearch
  dns:
  - elasticsearch  # Compose service, resolved by the embedded Docker DNS server name
  - elasticsearch.doh.gov.ph
  - localhost      # local connections
  ip:
  - 127.0.0.1      # local connections
  - ::1
  - 10.11.134.8

- name: kibana
  dns:
  - kibana
  - localhost
  - kibana.doh.gov.ph
  ip:
  - 127.0.0.1
  - ::1
  - 10.11.134.8

- name: fleet-server
  dns:
  - fleet-server
  - localhost
  - fleet-server.doh.gov.ph
  ip:
  - 127.0.0.1
  - ::1
  - 10.11.134.8

- name: apm-server
  dns:
  - apm-server
  - localhost
  - apm-server.doh.gov.ph
  ip:
  - 127.0.0.1
  - ::1
  - 10.11.134.8

- name: logstash
  dns:
  - logstash
  - localhost
  - logstash.doh.gov.ph
  ip:
  - 127.0.0.1
  - ::1
  - 10.11.134.8
