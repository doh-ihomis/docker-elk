version: '3.7'

services:

  # The 'tls' service runs a one-off script which initializes TLS certificates and
  # private keys for all components of the stack inside the local tls/ directory.
  #
  # This task only needs to be performed once, *before* the first stack startup.
  #
  # By default, it is excluded from the services started by 'docker compose up'
  # due to the non-default profile it belongs to. To run it, either provide the
  # '--profile=setup' CLI flag to Compose commands, or "up" the service by name
  # such as 'docker compose up tls'.
  tls:
    profiles:
      - setup
    build:
      context: tls/
      args:
        ELASTIC_VERSION: ${ELASTIC_VERSION}
    user: root  # ensures we can write to the local tls/ directory.
    init: true
    volumes:
      - ./tls/entrypoint.sh:/entrypoint.sh:ro,Z
      - ./tls/instances.yml:/usr/share/elasticsearch/tls/instances.yml:ro,Z
      - ./tls/certs:/usr/share/elasticsearch/tls/certs:z

  # The 'setup' service runs a one-off script which initializes users inside
  # Elasticsearch — such as 'logstash_internal' and 'kibana_system' — with the
  # values of the passwords defined in the '.env' file. It also creates the
  # roles required by some of these users.
  #
  # This task only needs to be performed once, during the *initial* startup of
  # the stack. Any subsequent run will reset the passwords of existing users to
  # the values defined inside the '.env' file, and the built-in roles to their
  # default permissions.
  #
  # By default, it is excluded from the services started by 'docker compose up'
  # due to the non-default profile it belongs to. To run it, either provide the
  # '--profile=setup' CLI flag to Compose commands, or "up" the service by name
  # such as 'docker compose up setup'.
  setup:
    profiles:
      - setup
    build:
      context: setup/
      args:
        ELASTIC_VERSION: ${ELASTIC_VERSION}
    init: true
    volumes:
      - ./setup/entrypoint.sh:/entrypoint.sh:ro,Z
      - ./setup/lib.sh:/lib.sh:ro,Z
      - ./setup/roles:/roles:ro,Z
      # (!) CA certificate. Generate using the 'tls' service.
      - ./tls/certs/ca/ca.crt:/ca.crt:ro,z
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-}
      LOGSTASH_INTERNAL_PASSWORD: ${LOGSTASH_INTERNAL_PASSWORD:-}
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD:-}
      METRICBEAT_INTERNAL_PASSWORD: ${METRICBEAT_INTERNAL_PASSWORD:-}
      FILEBEAT_INTERNAL_PASSWORD: ${FILEBEAT_INTERNAL_PASSWORD:-}
      HEARTBEAT_INTERNAL_PASSWORD: ${HEARTBEAT_INTERNAL_PASSWORD:-}
      MONITORING_INTERNAL_PASSWORD: ${MONITORING_INTERNAL_PASSWORD:-}
      BEATS_SYSTEM_PASSWORD: ${BEATS_SYSTEM_PASSWORD:-}
    networks:
      - elk
      - monitor-net
    depends_on:
      - elasticsearch

  elasticsearch:
    user: "1000:1000"
    build:
      context: elasticsearch/
      args:
        ELASTIC_VERSION: ${ELASTIC_VERSION}
    volumes:
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro,Z
      - /mnt/disks/elk/elasticsearch:/usr/share/elasticsearch/data:Z
      # (!) TLS certificates. Generate using the 'tls' service.
      - ./tls/certs/ca/ca.crt:/usr/share/elasticsearch/config/ca.crt:ro,z
      - ./tls/certs/elasticsearch/elasticsearch.crt:/usr/share/elasticsearch/config/elasticsearch.crt:ro,z
      - ./tls/certs/elasticsearch/elasticsearch.key:/usr/share/elasticsearch/config/elasticsearch.key:ro,z
    ports:
      - 9201:9200
      - 9300:9300
    environment:
      node.name: elasticsearch
      ES_JAVA_OPTS: -Xmx1g -Xms1g
      # Bootstrap password.
      # Used to initialize the keystore during the initial startup of
      # Elasticsearch. Ignored on subsequent runs.
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-}
      # Use single node discovery in order to disable production mode and avoid bootstrap checks.
      # see: https://www.elastic.co/guide/en/elasticsearch/reference/current/bootstrap-checks.html
      discovery.type: single-node
      LOG_LEVEL: debug
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.backend=elasticsearch
      - traefik.http.middlewares.redirect-web-secure.redirectscheme.scheme=https
      - traefik.http.routers.elasticsearch-web.middlewares=redirect-web-secure
      - traefik.http.routers.elasticsearch-web.rule=Host(`elasticsearch.doh.gov.ph`)
      - traefik.http.routers.elasticsearch-web.entrypoints=web
      - traefik.http.routers.elasticsearch-web-secure.rule=Host(`elasticsearch.doh.gov.ph`)
      - traefik.http.routers.elasticsearch-web-secure.entrypoints=web-secure
      - traefik.http.routers.elasticsearch-web-secure.tls=true
      - traefik.http.routers.elasticsearch-web-secure.tls.certresolver=default
      - traefik.http.routers.elasticsearch-web-secure.service=elasticsearch-service
      - traefik.http.services.elasticsearch-service.loadbalancer.server.port=9201
    networks:
      - elk
      - monitor-net
    restart: unless-stopped

  logstash:
    build:
      context: logstash/
      args:
        ELASTIC_VERSION: ${ELASTIC_VERSION}
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro,Z
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro,Z
      # (!) CA certificate. Generate using the 'tls' service.
      - ./tls/certs/ca/ca.crt:/usr/share/logstash/config/ca.crt:ro,z
      - ./tls/certs/elastic/elastic.crt:/usr/share/logstash/config/elastic.crt:ro,z
      - ./tls/certs/elastic/elastic.key:/usr/share/logstash/config/elastic.key:ro,z
    ports:
      - 5044:5044
      - 50000:50000/tcp
      - 50000:50000/udp
      - 9600:9600
    environment:
      LS_JAVA_OPTS: -Xmx1g -Xmx1g
      LOGSTASH_INTERNAL_PASSWORD: ${LOGSTASH_INTERNAL_PASSWORD:-}
      #LOG_LEVEL: debug
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.backend=logstash
      - traefik.http.middlewares.redirect-web-secure.redirectscheme.scheme=https
      - traefik.http.routers.logstash-web.middlewares=redirect-web-secure
      - traefik.http.routers.logstash-web.rule=Host(`logstash.doh.gov.ph`)
      - traefik.http.routers.logstash-web.entrypoints=web
      - traefik.http.routers.logstash-web-secure.rule=Host(`logstash.doh.gov.ph`)
      - traefik.http.routers.logstash-web-secure.entrypoints=web-secure
      - traefik.http.routers.logstash-web-secure.tls=true
      - traefik.http.routers.logstash-web-secure.tls.certresolver=default
      - traefik.http.routers.logstash-web-secure.service=logstash-service
      - traefik.http.services.logstash-service.loadbalancer.server.port=5044
    networks:
      - elk
      - monitor-net
    depends_on:
      - elasticsearch
    restart: unless-stopped

  kibana:
    build:
      context: kibana/
      args:
        ELASTIC_VERSION: ${ELASTIC_VERSION}
    volumes:
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro,Z
      # (!) TLS certificates. Generate using the 'tls' service.
      - ./tls/certs/ca/ca.crt:/usr/share/kibana/config/ca.crt:ro,z
      - ./tls/certs/kibana/kibana.crt:/usr/share/kibana/config/kibana.crt:ro,Z
      - ./tls/certs/kibana/kibana.key:/usr/share/kibana/config/kibana.key:ro,Z
    ports:
      - 5601:5601
    environment:
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD:-}
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.backend=kibana
      - traefik.http.middlewares.redirect-web-secure.redirectscheme.scheme=https
      - traefik.http.routers.kibana-web.middlewares=redirect-web-secure
      - traefik.http.routers.kibana-web.rule=Host(`kibana.doh.gov.ph`)
      - traefik.http.routers.kibana-web.entrypoints=web
      - traefik.http.routers.kibana-web-secure.rule=Host(`kibana.doh.gov.ph`)
      - traefik.http.routers.kibana-web-secure.entrypoints=web-secure
      - traefik.http.routers.kibana-web-secure.tls=true
      - traefik.http.routers.kibana-web-secure.tls.certresolver=default
      - traefik.http.routers.kibana-web-secure.service=kibana-service
      - traefik.http.services.kibana-service.loadbalancer.server.port=5602
    networks:
      - elk
      - monitor-net
    depends_on:
      - elasticsearch
    restart: unless-stopped

networks:
  elk:
    driver: bridge
  monitor-net:
    external: true
  traefik:
    external: true
